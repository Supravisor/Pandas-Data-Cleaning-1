
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pandas Data Cleaning 1</title>
  <link href="./styles.css" rel="stylesheet" />
</head>

<body>

  <h1>Pandas - Data Cleaning 1</h1>

  <form name="editor">
    <table>
      <tbody>
        <tr>
          <td id="buttons">
            <div>

<h2>Import modules</h2>

<p>
  <input type="button" class="btn btn-module" value="pandas" onclick="document.editor.textbox.value+='\nimport pandas as pd'" />
  <input type="button" class="btn btn-module" value="numpy" onclick="document.editor.textbox.value+='\nimport numpy as np'" />
  <input type="button" class="btn btn-module" value="version" onclick="document.editor.textbox.value+='\nprint(np.__version__)'" />
</p>

<hr />
<h2>Missing data</h2>

<p>
  <input type="button" class="btn btn-success" value="nan" onclick="np(this.value);" />
  <input type="button" class="btn btn-success" value="inf" onclick="np(this.value);" />
</p>

<p>
  <input type="button" class="btn btn-success" value="isnan" onclick="npis(this.value);" />
  <input type="button" class="btn btn-success" value="isinf" onclick="npis(this.value);" />
  <input class="btn" name="npArray" id="npArray" placeholder="array" type="textfield" />
</p>

<p>
  <input type="button" class="btn btn-success" value="isfinite(np.nan)" onclick="isFinite(this.value);" />
  <input type="button" class="btn btn-success" value="isfinite(np.inf)" onclick="isFinite(this.value);" />
</p>

<p>
  <input type="button" class="btn btn-success" value="filter" onclick="filter();" />
  <input class="btn" name="variableMissing" id="variableMissing" placeholder="variable" type="textfield" />
</p>

<hr />
<h2>Data cleaning with Pandas</h2>

<p>
  <input class="btn" name="value" id="value" placeholder="value" type="textfield" />
  <select name="dataSet">
    <option value=""></option>
    <option value="DataFrame">DataFrame</option>
    <option value="Series">Series</option>
  </select>
</p>

<p>
  <input type="button" class="btn btn-success" value="isnull" onclick="isn(this.value);" />
  <input type="button" class="btn btn-success" value="isna" onclick="isn(this.value);" />
</p>

<p>
  <input type="button" class="btn btn-success" value="notnull" onclick="isn(this.value);" />
  <input type="button" class="btn btn-success" value="notna" onclick="isn(this.value);" />
</p>

<p>
  <input type="button" class="btn btn-success" value="filter" onclick="filterCleaning();" />
  <input class="btn" name="variableCleaning" id="variableCleaning" placeholder="variable" type="textfield" />
</p>

<hr />
<h2>Drop null values</h2>

<p>
  <input class="btn" name="variableDropping" id="variableDropping" placeholder="variable" type="textfield" />
  <select name="dropSet">
    <option value=""></option>
    <option value="all">all</option>
    <option value="any">any</option>
    <option value="columns">columns</option>
    <option value="rows">rows</option>
  </select>
  <input class="btn" name="dropNumber" id="dropNumber" placeholder="thresh" type="number" />
</p>

<p>
  <input type="button" class="btn btn-primary" value="drop" onclick="dropNull();" />
</p>

<hr />
<h2>Data at a glance</h2>

<p>
  <input class="btn" name="variableData" id="variableData" placeholder="variable" type="textfield" />
</p>

<p>
  <input type="button" class="btn btn-success" value="info()" onclick="data(this.value);" />
  <input type="button" class="btn btn-success" value="shape" onclick="data(this.value);" />
  <input type="button" class="btn btn-success" value="isnull()" onclick="data(this.value);" />
  <input type="button" class="btn btn-success" value="isnull().sum()" onclick="data(this.value);" />
</p>

<hr />
<h2>Fill null values</h2>

<p>
  <input class="btn" name="variableFilling" id="variableFilling" placeholder="variable" type="textfield" />
</p>

<p>
  <input type="button" class="btn btn-success" value="0" onclick="fillna(this.value)" />
</p>

            </div>
          </td>
          <td id="textbox">
            <textarea id="preview" name="textbox"></textarea>
          </td>
          <td id="empty">
          </td>
        </tr>
      </tbody>
    </table>
  </form>

  <script src="./script.js"></script>

</body>
</html>
